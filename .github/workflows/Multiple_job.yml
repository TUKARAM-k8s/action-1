name: Multiple Jobs Workflow

on: [push]

jobs:
    ascii-job:
        runs-on: ubuntu-latest
        steps:
        - name: "checkout repository"
          uses: actions/checkout@v3

        - name: "list repo files"
          run: ls -ltra

    build_job_1:
        needs: [ascii-job]
        runs-on: ubuntu-latest
        steps:
        - name: "checkout repository"
          uses: actions/checkout@v3

        - name: "Install Cowsay program"
          run: sudo apt-get install cowsay -y

        - name: "Executing Cowsay program"
          run: cowsay -f dragon "Hello, I am a dragon" >> dragon.txt

        - name: "Uploading the file as artifact"
          uses: actions/upload-artifact@v3
          with:
            name: dragon-file
            path: dragon.txt

    test_job_2:
        needs: [build_job_1]
        runs-on: ubuntu-latest
        steps:
        - name: "checkout repository"
          uses: actions/checkout@v3

        - name: "Download the dragon-file"
          uses: actions/download-artifact@v3
          with:
            name: dragon-file
            path: .

        - name: "Test file existence"
          run: grep -q "dragon.txt" dragon.txt && echo "File exists" || echo "File does not exist"

    deploy_job_3:
        needs: [test_job_2]
        runs-on: ubuntu-latest
        steps:
        - name: "checkout repository"
          uses: actions/checkout@v3

        - name: "Download the dragon-file"
          uses: actions/download-artifact@v3
          with:
            name: dragon-file
            path: .
            
        - name: "Read files in the repository"
          run: cat dragon.txt

        - name: "Deploying the file"
          run: echo "Deploying the file dragon.txt to production environment"